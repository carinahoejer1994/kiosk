<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Hjemme infoskærm</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #b8cdd8;
      color: #2c3e50;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      padding: 28px;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ── LAYOUT ── */
    .top-bar {
      display: -webkit-flex;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    #clock {
      font-size: 64px;
      font-weight: 200;
      color: #1a2a35;
      letter-spacing: -2px;
      line-height: 1;
    }

    #date {
      font-size: 13px;
      color: #4a6070;
      margin-top: 4px;
    }

    .main-grid {
      display: -webkit-flex;
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
    }

    .col-left  { flex: 1.2; display: -webkit-flex; display: flex; flex-direction: column; gap: 16px; }
    .col-right { flex: 1;   display: -webkit-flex; display: flex; flex-direction: column; gap: 16px; }

    .bottom-grid {
      display: -webkit-flex;
      display: flex;
      gap: 16px;
    }

    .bottom-grid .card { flex: 1; }

    /* ── CARDS ── */
    .card {
      background: rgba(255,255,255,0.85);
      border-radius: 6px;
      padding: 14px;
    }

    .card-title {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #7a9aaa;
      margin-bottom: 10px;
      font-weight: 500;
    }

    /* Touch feedback – Tizen kompatibel */
    .card.touched { background: rgba(255,255,255,0.65); }

    /* ── FOTO SLIDESHOW ── */
    .photo-slot {
      background: #1a2a35;
      border-radius: 6px;
      overflow: hidden;
      height: 220px;
      position: relative;
    }

    .photo-slot img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }

    .photo-slot img.active { opacity: 1; }

    .photo-slot .no-photo {
      display: -webkit-flex;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #4a6070;
      font-size: 12px;
      gap: 8px;
    }

    /* ── SPOTIFY ── */
    .sp-wrap { display: -webkit-flex; display: flex; align-items: center; gap: 12px; }

    .sp-art {
      width: 48px; height: 48px;
      background: #1a2a35;
      border-radius: 4px;
      flex-shrink: 0;
      display: -webkit-flex;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .sp-art img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }

    .sp-info { flex: 1; min-width: 0; }
    .sp-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sp-artist { font-size: 11px; color: #7a9aaa; margin-top: 2px; }

    .sp-controls {
      display: -webkit-flex;
      display: flex;
      gap: 10px;
      margin-top: 10px;
      align-items: center;
    }

    .sp-btn {
      background: none;
      border: none;
      color: #4a6070;
      cursor: pointer;
      font-size: 18px;
      padding: 4px 6px;
      border-radius: 4px;
      line-height: 1;
    }

    .sp-btn.touched, .sp-btn:active { background: rgba(0,0,0,0.1); }

    .sp-progress {
      flex: 1;
      height: 3px;
      background: rgba(0,0,0,0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .sp-fill {
      height: 100%;
      background: #4a6070;
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s linear;
    }

    .sp-status {
      font-size: 10px;
      color: #aaa;
      margin-top: 6px;
      text-align: center;
    }

    /* ── VEJR ── */
    .weather-main {
      display: -webkit-flex;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .weather-temp { font-size: 36px; font-weight: 200; color: #1a2a35; }
    .weather-desc { font-size: 12px; color: #7a9aaa; }

    .weather-forecast {
      display: -webkit-flex;
      display: flex;
      gap: 14px;
      margin-top: 8px;
    }

    .fc-day { font-size: 11px; color: #7a9aaa; }
    .fc-day span { color: #2c3e50; }

    /* ── KALENDER ── */
    .cal-row {
      display: -webkit-flex;
      display: flex;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      align-items: center;
      font-size: 12px;
    }

    .cal-row:last-child { border: none; }

    .cal-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .cal-time { color: #7a9aaa; width: 38px; font-size: 11px; }
    .cal-text { color: #2c3e50; }
    .cal-person { font-size: 10px; color: #aaa; margin-left: auto; }

    .cal-loading { font-size: 12px; color: #aaa; }

    /* ── TODO ── */
    .todo-item {
      display: -webkit-flex;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      font-size: 12px;
      color: #2c3e50;
      cursor: pointer;
    }

    .todo-item input[type=checkbox] {
      accent-color: #7a9aaa;
      width: 13px; height: 13px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-item.done span {
      text-decoration: line-through;
      color: #aaa;
    }

    .add-btn {
      font-size: 11px;
      color: #7a9aaa;
      margin-top: 8px;
      cursor: pointer;
      display: -webkit-flex;
      display: flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      padding: 0;
    }

    .add-btn:active { color: #2c3e50; }

    /* ── INPUT OVERLAY ── */
    #input-overlay {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #input-overlay.show {
      display: -webkit-flex;
      display: flex;
    }

    #input-box {
      background: #fff;
      border-radius: 10px;
      padding: 24px;
      width: 320px;
      text-align: center;
    }

    #input-box p { font-size: 14px; color: #4a6070; margin-bottom: 12px; }

    #input-field {
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 10px;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .input-btns { display: -webkit-flex; display: flex; gap: 10px; }

    .input-btns button {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: none;
      font-size: 13px;
      cursor: pointer;
    }

    #input-confirm { background: #4a6070; color: #fff; }
    #input-cancel  { background: #eee; color: #555; }
  </style>
</head>
<body>

  <!-- INPUT OVERLAY -->
  <div id="input-overlay">
    <div id="input-box">
      <p id="input-label">Ny opgave</p>
      <input id="input-field" type="text" placeholder="Skriv her...">
      <div class="input-btns">
        <button id="input-confirm">Tilføj</button>
        <button id="input-cancel">Annuller</button>
      </div>
    </div>
  </div>

  <!-- UR -->
  <div class="top-bar">
    <div>
      <div id="clock">--:--</div>
      <div id="date">loading...</div>
    </div>
  </div>

  <!-- HOVED GRID -->
  <div class="main-grid">
    <div class="col-left">

      <!-- FOTO SLIDESHOW -->
      <div class="photo-slot" id="photo-slot">
        <div class="no-photo" id="no-photo">
          <div style="font-size:32px;opacity:0.3">&#9732;</div>
          <div style="opacity:0.4">Familiefotos — se opsætning nedenfor</div>
        </div>
      </div>

      <!-- KALENDER -->
      <div class="card">
        <div class="card-title">Familiekalender</div>
        <div id="cal-content">
          <div class="cal-loading">Indlæser kalender...</div>
        </div>
      </div>

    </div>
    <div class="col-right">

      <!-- SPOTIFY -->
      <div class="card" id="sp-card">
        <div class="card-title">Spotify</div>
        <div class="sp-wrap">
          <div class="sp-art" id="sp-art">
            <span style="color:#4a6070;font-size:20px">&#9835;</span>
          </div>
          <div class="sp-info">
            <div class="sp-title" id="sp-title">Ikke forbundet</div>
            <div class="sp-artist" id="sp-artist">Spotify</div>
          </div>
        </div>
        <div class="sp-controls">
          <button class="sp-btn" id="sp-prev"
            ontouchstart="this.classList.add('touched')"
            ontouchend="this.classList.remove('touched')"
            onclick="spotifyCmd('previous')">&#9664;&#9664;</button>
          <button class="sp-btn" id="sp-play"
            ontouchstart="this.classList.add('touched')"
            ontouchend="this.classList.remove('touched')"
            onclick="spotifyCmd('play-pause')">&#9654;</button>
          <button class="sp-btn" id="sp-next"
            ontouchstart="this.classList.add('touched')"
            ontouchend="this.classList.remove('touched')"
            onclick="spotifyCmd('next')">&#9654;&#9654;</button>
          <div class="sp-progress"><div class="sp-fill" id="sp-fill"></div></div>
        </div>
        <div class="sp-status" id="sp-status">
          Se opsætning i koden for Spotify-integration
        </div>
      </div>

      <!-- VEJR -->
      <div class="card">
        <div class="card-title">Vejr — Skanderborg</div>
        <div class="weather-main">
          <div class="weather-temp" id="w-temp">--°</div>
          <div class="weather-desc" id="w-desc">indlæser...</div>
        </div>
        <div class="weather-forecast" id="w-forecast"></div>
      </div>

      <!-- INDKØB -->
      <div class="card">
        <div class="card-title">Indkøbsliste</div>
        <div id="todo-shop"></div>
        <button class="add-btn" onclick="openInput('shop')">+ Tilføj vare</button>
      </div>

    </div>
  </div>

  <!-- BUND TODO GRID -->
  <div class="bottom-grid">
    <div class="card">
      <div class="card-title">Morgenmad</div>
      <div id="todo-morning"></div>
      <button class="add-btn" onclick="openInput('morning')">+ Tilføj</button>
    </div>
    <div class="card">
      <div class="card-title">Opgaver</div>
      <div id="todo-tasks"></div>
      <button class="add-btn" onclick="openInput('tasks')">+ Tilføj</button>
    </div>
    <div class="card">
      <div class="card-title">Aftensmad</div>
      <div id="todo-dinner"></div>
      <button class="add-btn" onclick="openInput('dinner')">+ Tilføj</button>
    </div>
  </div>


<script>
/* =========================================================
   KONFIGURATION — udfyld disse værdier
   ========================================================= */

var CONFIG = {

  // ── FOTO SLIDESHOW ──────────────────────────────────────
  // Læg dine billedfiler i samme mappe som index.html
  // og list filnavnene her. Understøtter jpg, png, webp.
  photos: [
    // 'foto1.jpg',
    // 'foto2.jpg',
    // 'foto3.jpg',
  ],
  // Antal sekunder mellem hvert billede
  photoInterval: 15,

  // ── GOOGLE KALENDER ─────────────────────────────────────
  // 1. Gå til calendar.google.com
  // 2. Indstillinger → din kalender → Del med specifikke brugere
  //    ELLER gør den offentlig for at bruge API
  // 3. Under "Integrer kalender" kopiér kalender-ID (ser sådan ud:
  //    xxxx@group.calendar.google.com  eller din@gmail.com)
  // 4. Opret en API-nøgle på console.cloud.google.com
  //    → Aktiver "Google Calendar API" → Opret credentials → API key
  googleCalendarIds: [
    // { id: 'din@gmail.com', color: '#7a9aaa', name: 'Familie' },
    // { id: 'partner@gmail.com', color: '#c0856a', name: 'Partner' },
  ],
  googleApiKey: '', // '<din API nøgle her>'

  // ── SPOTIFY ─────────────────────────────────────────────
  // Spotify kræver en lokal token-proxy da Tizen ikke kan
  // køre OAuth-flow direkte. Fremgangsmåde:
  // 1. Opret en app på developer.spotify.com
  // 2. Kør den medfølgende Node.js proxy (spotify-proxy.js)
  //    på din lokale server/NAS/Raspberry Pi
  // 3. Indsæt URL til proxyen herunder
  spotifyProxyUrl: '', // 'http://192.168.1.x:3000'

  // ── LOKATION (vejr) ─────────────────────────────────────
  weatherLat: 56.05,
  weatherLon: 9.93,
  weatherCity: 'Skanderborg',
};


/* =========================================================
   UR & DATO
   ========================================================= */
function pad(n) { return n < 10 ? '0' + n : '' + n; }

function updateClock() {
  var d = new Date();
  document.getElementById('clock').textContent =
    pad(d.getHours()) + ':' + pad(d.getMinutes());
  var days   = ['søndag','mandag','tirsdag','onsdag','torsdag','fredag','lørdag'];
  var months = ['januar','februar','marts','april','maj','juni',
                'juli','august','september','oktober','november','december'];
  document.getElementById('date').textContent =
    days[d.getDay()] + ' ' + d.getDate() + '. ' + months[d.getMonth()];
}

updateClock();
setInterval(updateClock, 1000);


/* =========================================================
   FOTO SLIDESHOW
   ========================================================= */
var photoIndex = 0;

function initPhotos() {
  if (!CONFIG.photos || CONFIG.photos.length === 0) return;
  var slot = document.getElementById('photo-slot');
  var noPhoto = document.getElementById('no-photo');
  if (noPhoto) noPhoto.style.display = 'none';

  CONFIG.photos.forEach(function(src, i) {
    var img = document.createElement('img');
    img.src = src;
    img.className = i === 0 ? 'active' : '';
    slot.appendChild(img);
  });

  setInterval(function() {
    var imgs = slot.querySelectorAll('img');
    if (imgs.length < 2) return;
    imgs[photoIndex].className = '';
    photoIndex = (photoIndex + 1) % imgs.length;
    imgs[photoIndex].className = 'active';
  }, CONFIG.photoInterval * 1000);
}

initPhotos();


/* =========================================================
   VEJR  (Open-Meteo — gratis, ingen nøgle)
   ========================================================= */
var WMO_CODES = {
  0:'solskin', 1:'næsten klar', 2:'delvis skyet', 3:'overskyet',
  45:'tåge', 48:'tåge', 51:'let dis', 53:'dis', 55:'tæt dis',
  61:'let regn', 63:'regn', 65:'kraftig regn',
  71:'let sne', 73:'sne', 75:'kraftig sne',
  80:'byger', 81:'regnbyger', 82:'kraftige byger',
  95:'torden', 96:'torden m. hagl', 99:'kraftig torden'
};

function loadWeather() {
  var url = 'https://api.open-meteo.com/v1/forecast' +
    '?latitude=' + CONFIG.weatherLat +
    '&longitude=' + CONFIG.weatherLon +
    '&current_weather=true' +
    '&daily=temperature_2m_max,temperature_2m_min,weathercode' +
    '&timezone=Europe%2FCopenhagen' +
    '&forecast_days=5';

  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4 || xhr.status !== 200) return;
    var data = JSON.parse(xhr.responseText);
    var cw   = data.current_weather;
    document.getElementById('w-temp').textContent =
      Math.round(cw.temperature) + '°';
    document.getElementById('w-desc').textContent =
      WMO_CODES[cw.weathercode] || 'ukendt';

    var fc = document.getElementById('w-forecast');
    fc.innerHTML = '';
    var days = ['søn','man','tir','ons','tor','fre','lør'];
    var daily = data.daily;
    for (var i = 1; i < Math.min(5, daily.time.length); i++) {
      var d   = new Date(daily.time[i]);
      var max = Math.round(daily.temperature_2m_max[i]);
      var min = Math.round(daily.temperature_2m_min[i]);
      var div = document.createElement('div');
      div.className = 'fc-day';
      div.innerHTML = days[d.getDay()] + '<br><span>' + max + '°</span>/' + min + '°';
      fc.appendChild(div);
    }
  };
  xhr.send();
}

loadWeather();
setInterval(loadWeather, 600000);


/* =========================================================
   GOOGLE KALENDER
   ========================================================= */
function loadCalendar() {
  var ids = CONFIG.googleCalendarIds;
  if (!CONFIG.googleApiKey || ids.length === 0) {
    document.getElementById('cal-content').innerHTML =
      '<div class="cal-loading">Udfyld googleCalendarIds og googleApiKey i CONFIG</div>';
    return;
  }

  var allEvents = [];
  var loaded    = 0;
  var now       = new Date();
  var end       = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000);

  ids.forEach(function(cal) {
    var url = 'https://www.googleapis.com/calendar/v3/calendars/' +
      encodeURIComponent(cal.id) + '/events' +
      '?key=' + CONFIG.googleApiKey +
      '&timeMin=' + now.toISOString() +
      '&timeMax=' + end.toISOString() +
      '&singleEvents=true' +
      '&orderBy=startTime' +
      '&maxResults=10';

    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.onreadystatechange = function() {
      if (xhr.readyState !== 4) return;
      loaded++;
      if (xhr.status === 200) {
        var data = JSON.parse(xhr.responseText);
        (data.items || []).forEach(function(ev) {
          allEvents.push({
            title:  ev.summary || '(ingen titel)',
            start:  ev.start.dateTime || ev.start.date,
            color:  cal.color,
            person: cal.name
          });
        });
      }
      if (loaded === ids.length) renderCalendar(allEvents);
    };
    xhr.send();
  });
}

function renderCalendar(events) {
  var el = document.getElementById('cal-content');
  if (events.length === 0) {
    el.innerHTML = '<div class="cal-loading">Ingen kommende begivenheder</div>';
    return;
  }
  events.sort(function(a, b) { return new Date(a.start) - new Date(b.start); });
  var days  = ['søn','man','tir','ons','tor','fre','lør'];
  var html  = '';
  var shown = 0;
  events.forEach(function(ev) {
    if (shown >= 6) return;
    var d    = new Date(ev.start);
    var time = ev.start.indexOf('T') > -1
      ? pad(d.getHours()) + ':' + pad(d.getMinutes())
      : 'hele dagen';
    html += '<div class="cal-row">' +
      '<div class="cal-dot" style="background:' + ev.color + '"></div>' +
      '<div class="cal-time">' + days[d.getDay()] + ' ' + time + '</div>' +
      '<div class="cal-text">' + ev.title + '</div>' +
      '<div class="cal-person">' + ev.person + '</div>' +
      '</div>';
    shown++;
  });
  el.innerHTML = html;
}

loadCalendar();
setInterval(loadCalendar, 300000);


/* =========================================================
   SPOTIFY  (kræver lokal proxy — se spotify-proxy.js)
   ========================================================= */
var spPlaying = false;
var spFillPct = 0;
var spTimer   = null;

function loadSpotify() {
  if (!CONFIG.spotifyProxyUrl) return;
  var xhr = new XMLHttpRequest();
  xhr.open('GET', CONFIG.spotifyProxyUrl + '/current', true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4 || xhr.status !== 200) return;
    var d = JSON.parse(xhr.responseText);
    document.getElementById('sp-title').textContent  = d.title  || '—';
    document.getElementById('sp-artist').textContent = d.artist || '—';
    document.getElementById('sp-status').textContent = '';
    spPlaying = d.is_playing;
    document.getElementById('sp-play').innerHTML = spPlaying ? '&#9646;&#9646;' : '&#9654;';
    if (d.duration_ms > 0) {
      spFillPct = Math.round((d.progress_ms / d.duration_ms) * 100);
      document.getElementById('sp-fill').style.width = spFillPct + '%';
    }
    if (d.album_art) {
      document.getElementById('sp-art').innerHTML =
        '<img src="' + d.album_art + '" alt="album">';
    }
  };
  xhr.send();
}

function spotifyCmd(cmd) {
  if (!CONFIG.spotifyProxyUrl) return;
  var xhr = new XMLHttpRequest();
  xhr.open('POST', CONFIG.spotifyProxyUrl + '/' + cmd, true);
  xhr.send();
  setTimeout(loadSpotify, 500);
}

loadSpotify();
setInterval(loadSpotify, 5000);


/* =========================================================
   TODO LISTER
   ========================================================= */
var TODO = {
  shop:    { label: 'Indkøb',     items: ['Mælk', 'Æg', 'Brød', 'Smør'] },
  morning: { label: 'Morgenmad',  items: ['Havregrød', 'Juice', 'Kaffe'] },
  tasks:   { label: 'Opgaver',    items: ['Vask tøj', 'Ring til mor'] },
  dinner:  { label: 'Aftensmad',  items: ['Pasta', 'Kød', 'Grøntsager'] }
};

var TODO_CHECKED = { shop: {}, morning: {}, tasks: {}, dinner: {} };

function renderTodo(id) {
  var el = document.getElementById('todo-' + id);
  if (!el) return;
  el.innerHTML = '';
  TODO[id].items.forEach(function(item, i) {
    var div   = document.createElement('div');
    var isDone = !!TODO_CHECKED[id][i];
    div.className = 'todo-item' + (isDone ? ' done' : '');

    var cb = document.createElement('input');
    cb.type = 'checkbox';
    if (isDone) cb.checked = true;

    var label = document.createElement('span');
    label.textContent = item;

    cb.addEventListener('change', function() {
      TODO_CHECKED[id][i] = this.checked;
      renderTodo(id);
    });

    div.appendChild(cb);
    div.appendChild(label);
    el.appendChild(div);
  });
}

Object.keys(TODO).forEach(renderTodo);

/* Touch-venlig input overlay */
var inputTarget = null;

function openInput(id) {
  inputTarget = id;
  document.getElementById('input-label').textContent =
    'Ny vare til ' + TODO[id].label;
  document.getElementById('input-field').value = '';
  document.getElementById('input-overlay').classList.add('show');
  document.getElementById('input-field').focus();
}

document.getElementById('input-confirm').addEventListener('click', function() {
  var val = document.getElementById('input-field').value.trim();
  if (val && inputTarget) {
    TODO[inputTarget].items.push(val);
    renderTodo(inputTarget);
  }
  document.getElementById('input-overlay').classList.remove('show');
  inputTarget = null;
});

document.getElementById('input-cancel').addEventListener('click', function() {
  document.getElementById('input-overlay').classList.remove('show');
  inputTarget = null;
});

/* Touch feedback på kort */
var cards = document.querySelectorAll('.card');
for (var i = 0; i < cards.length; i++) {
  (function(c) {
    c.addEventListener('touchstart', function() { c.classList.add('touched'); });
    c.addEventListener('touchend',   function() {
      setTimeout(function() { c.classList.remove('touched'); }, 250);
    });
  })(cards[i]);
}
</script>
</body>
